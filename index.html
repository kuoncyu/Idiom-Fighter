<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成語戰機：星際觸控版</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-gold: #ffea00;
            --neon-purple: #b026ff;
            --neon-green: #00ffcc;
            --neon-orange: #ffaa00;
            --neon-red: #ff3366;
            --bg-dark: #050510;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: #020205;
            display: block;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            touch-action: none;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .menu-overlay {
            background: rgba(5, 5, 16, 0.95);
            border: 2px solid var(--neon-blue);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            pointer-events: auto;
            min-width: 320px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            max-height: 80vh;
            overflow-y: auto;
        }
        h1, h2 { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 20px; }
        .shop-title { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); margin-top: 0; }
        .btn {
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 12px 20px; margin: 10px auto; cursor: pointer;
            font-size: 1.1rem; transition: all 0.3s; border-radius: 5px; display: block;
            width: 90%; text-transform: uppercase; font-weight: bold;
        }
        .btn:hover:not(:disabled) { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }
        .btn:disabled { border-color: #555; color: #555; cursor: not-allowed; background: transparent; }
        .btn-shop { border-color: var(--neon-purple); color: var(--neon-purple); }
        .btn-shop:hover:not(:disabled) { background: var(--neon-purple); color: white; box-shadow: 0 0 15px var(--neon-purple); }
        .btn-start { background: rgba(0, 242, 255, 0.2); font-size: 1.3rem; padding: 15px; margin-top: 20px; }
        
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px; display: flex;
            justify-content: space-between; pointer-events: none; font-family: 'Courier New', monospace;
            font-size: 1rem; color: var(--neon-blue); background: rgba(0,0,0,0.6);
            padding: 10px 15px; border-radius: 10px; border: 1px solid rgba(0,242,255,0.3); z-index: 5;
        }
        .hud-item { margin: 0 5px; }
        .hud-dm { color: var(--neon-purple); font-weight: bold; text-shadow: 0 0 5px var(--neon-purple); }
        
        #stage-info {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            color: var(--neon-gold); font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 5px black;
        }
        .boss-hp-bar { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); width: 80%; height: 10px; background: #333; border: 1px solid white; display: none; }
        .boss-hp-fill { width: 100%; height: 100%; background: linear-gradient(to right, #f00, #ff0); transition: width 0.2s; }
        
        .idiom-slots {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; align-items: flex-end; z-index: 20; flex-wrap: nowrap; justify-content: center; width: 98%; pointer-events: none;
        }
        .slot {
            flex: 1; max-width: 120px; height: 80px; border: 2px solid #444; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 8px; transition: all 0.3s; pointer-events: none; position: relative;
        }
        .slot.collecting { border-color: var(--neon-blue); box-shadow: 0 0 8px rgba(0, 242, 255, 0.3); }
        .slot.ready { 
            border-color: var(--neon-gold); box-shadow: 0 0 20px var(--neon-gold); 
            cursor: pointer; pointer-events: auto; animation: pulseReady 0.8s infinite alternate;
            background: rgba(255, 234, 0, 0.15);
        }
        
        .slot-title { font-size: 1.2rem; margin-bottom: 5px; white-space: nowrap; display: flex; gap: 2px; }
        .char { display: inline-block; transition: all 0.3s; font-weight: bold; }
        .char.collected { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); transform: scale(1.1); }
        .char.uncollected { color: rgba(255,255,255,0.2); }
        
        .slot-subtitle { font-size: 0.7rem; color: #aaa; text-align: center; }
        .ready .char.collected { color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold); }
        .ready .slot-subtitle { color: var(--neon-gold); font-weight: bold; font-size: 0.8rem; text-shadow: 0 0 5px var(--neon-gold); }
        
        @keyframes pulseReady { 
            from { box-shadow: 0 0 10px var(--neon-gold); border-color: var(--neon-gold); transform: scale(1); } 
            to { box-shadow: 0 0 30px var(--neon-gold), inset 0 0 15px var(--neon-gold); border-color: #fff; transform: scale(1.05); } 
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer"></div>
    <div id="hud" style="display:none;">
        <div class="hud-item">HP: <span id="hp-val">100</span></div>
        <div class="hud-item hud-dm">暗物質: <span id="dm-val">0</span></div>
        <div class="hud-item">LVL: <span id="lvl-val">1-1</span></div>
    </div>
    <div id="stage-info"></div>
    <div class="boss-hp-bar" id="boss-bar"><div class="boss-hp-fill" id="boss-hp-fill"></div></div>
    <div class="idiom-slots" id="idiom-ui" style="display:none;"></div>
</div>

<script>
"use strict";

class RetroAudio {
    constructor() { this.ctx = null; this.lastShootTime = 0; }
    init() {
        if(this.ctx) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        this.delayNode = this.ctx.createDelay(); this.delayNode.delayTime.value = 0.45; 
        this.feedbackNode = this.ctx.createGain(); this.feedbackNode.gain.value = 0.35; 
        this.delayNode.connect(this.feedbackNode); this.feedbackNode.connect(this.delayNode);
        this.mainGain = this.ctx.createGain(); this.mainGain.gain.value = 0.8;
        this.delayNode.connect(this.mainGain); this.mainGain.connect(this.ctx.destination);
        this.startSpaceBGM();
    }
    playTone(freq, type, duration, vol=0.1, useEcho=false) {
        if(!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        osc.connect(gain); gain.connect(this.mainGain);
        if (useEcho) gain.connect(this.delayNode);
        gain.gain.setValueAtTime(0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    }
    playNoise(duration, vol=0.1) {
        if(!this.ctx) return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        noise.connect(gain); gain.connect(this.mainGain); noise.start();
    }
    playShoot() { 
        if(!this.ctx) return;
        const now = this.ctx.currentTime;
        if(now - this.lastShootTime < 0.08) return; 
        this.lastShootTime = now;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        osc.connect(gain); gain.connect(this.mainGain);
        gain.gain.setValueAtTime(0.03, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    }
    playEnemyShoot() { this.playTone(600, 'triangle', 0.1, 0.02); }
    playHit() { this.playNoise(0.1, 0.05); }
    playExplosion() { this.playNoise(0.5, 0.3); }
    playCollect() { this.playTone(800, 'sine', 0.1, 0.05); setTimeout(()=>this.playTone(1200, 'sine', 0.1, 0.05, true), 50); }
    playReady() { this.playTone(400, 'square', 0.1, 0.05); setTimeout(()=>this.playTone(600, 'square', 0.1, 0.05), 100); setTimeout(()=>this.playTone(800, 'square', 0.3, 0.08, true), 200); }
    playUse() { this.playTone(150, 'sawtooth', 0.6, 0.15, true); }
    playTransition() { this.playTone(300, 'sine', 1.5, 0.05, true); this.playTone(600, 'sine', 1.5, 0.03, true); }
    
    startSpaceBGM() {
        if(this.bgmInterval) return;
        const chords = [[164.81, 196.00, 246.94, 293.66], [130.81, 164.81, 196.00, 246.94], [220.00, 261.63, 329.63, 392.00], [246.94, 293.66, 369.99, 440.00]];
        let step = 0; let chordIdx = 0;
        this.bgmInterval = setInterval(() => {
            if(!this.ctx || this.ctx.state !== 'running') return;
            if (step % 16 === 0) { chordIdx = Math.floor(step / 16) % chords.length; this.playTone(chords[chordIdx][0] / 2, 'triangle', 2.0, 0.12, true); }
            const note = chords[chordIdx][step % 4]; const finalNote = (step % 8 >= 4) ? note * 2 : note;
            this.playTone(finalNote, 'sine', 0.25, 0.04, true);
            step++;
        }, 150);
    }
}
const sfx = new RetroAudio();

const CONFIG = {
    IDIOMS: [
        { word: "破釜沉舟", effect: "BOMB_BOOST", desc: "清空彈幕" },
        { word: "金蟬脫殼", effect: "INVINCIBLE", desc: "10秒無敵" },
        { word: "勢如破竹", effect: "RAPID_FIRE", desc: "極速開火" },
        { word: "百步穿楊", effect: "LASER_BEAM", desc: "貫穿雷射" },
        { word: "星火燎原", effect: "SPREAD_FIRE", desc: "超級散彈" }
    ],
    MAX_STAGES: 8
};

class Vec2 { constructor(x, y) { this.x = x; this.y = y; } }

class ObjectPool {
    constructor(createFn, size = 150) {
        this.pool = []; this.createFn = createFn;
        for (let i = 0; i < size; i++) this.pool.push(createFn());
    }
    get() {
        let obj = this.pool.find(o => !o.active);
        if (!obj) { obj = this.createFn(); this.pool.push(obj); }
        obj.active = true; return obj;
    }
}

class Entity {
    constructor() { this.pos = new Vec2(0, 0); this.vel = new Vec2(0, 0); this.radius = 10; this.active = false; this.color = "#fff"; }
    update(dt) { this.pos.x += this.vel.x * dt; this.pos.y += this.vel.y * dt; }
    draw(ctx) {
        ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }
}

class Bullet extends Entity { constructor() { super(); this.isPlayer = false; this.damage = 1; } }

class FloatingText {
    constructor() { this.active = false; this.pos = new Vec2(0,0); this.text = ""; this.life = 0; this.color = "#fff"; }
    update(dt) { this.pos.y -= 50 * dt; this.life -= dt; if(this.life <= 0) this.active = false; }
    draw(ctx) {
        ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
        ctx.font = "bold 16px Arial"; ctx.fillText(this.text, this.pos.x, this.pos.y); ctx.restore();
    }
}

// Boss 程式碼保持一致
class Boss extends Entity {
    constructor(stage) {
        super();
        this.stage = stage;
        this.maxHp = stage === 9 ? 5000 : 300 + (stage - 1) * 350;
        this.hp = this.maxHp;
        this.radius = 45;
        this.color = stage === 9 ? "#ff00ff" : "#ff3333";
        this.pos = new Vec2(window.innerWidth / 2, -100);
        this.targetY = 120;
        this.shootTimer = 0;
        this.meteorTimer = 0;
        this.pattern = stage % 4;
        this.angle = 0;
        this.dmReward = stage * 100;
    }

    update(dt, playerPos, spawnBullet, spawnMeteor) {
        if (this.pos.y < this.targetY) this.pos.y += 100 * dt;
        this.pos.x = window.innerWidth / 2 + Math.sin(Date.now() / 1500) * (window.innerWidth/3);

        this.shootTimer += dt;
        const fireRate = this.stage === 9 ? 0.15 : Math.max(0.2, 1.0 - this.stage * 0.1);
        if (this.shootTimer > fireRate) { this.shoot(spawnBullet, playerPos); this.shootTimer = 0; }

        this.meteorTimer += dt;
        if (this.meteorTimer > 2.0) { spawnMeteor(this.pos.x, this.pos.y); this.meteorTimer = 0; }
    }

    shoot(spawnBullet, playerPos) {
        this.angle += 0.15;
        const speedBase = 120 + this.stage * 15;
        switch(this.pattern) {
            case 0:
                for(let i=0; i<6; i++) {
                    const b = spawnBullet(); b.pos = new Vec2(this.pos.x, this.pos.y);
                    const a = (i / 6) * Math.PI * 2 + this.angle;
                    b.vel = new Vec2(Math.cos(a) * speedBase, Math.sin(a) * speedBase); b.color = "#ff33aa"; b.isPlayer = false;
                } break;
            case 1:
                const b = spawnBullet(); b.pos = new Vec2(this.pos.x, this.pos.y);
                const angleToPlayer = Math.atan2(playerPos.y - this.pos.y, playerPos.x - this.pos.x);
                b.vel = new Vec2(Math.cos(angleToPlayer) * (speedBase * 1.3), Math.sin(angleToPlayer) * (speedBase * 1.3)); b.color = "#ffcc00"; b.isPlayer = false; break;
            case 2:
                for(let i=0; i<4; i++) {
                    const b2 = spawnBullet(); b2.pos = new Vec2(this.pos.x, this.pos.y);
                    b2.vel = new Vec2((Math.random()-0.5) * speedBase * 1.5, speedBase + Math.random()*50); b2.color = "#00ff00"; b2.isPlayer = false;
                } break;
            case 3:
                for(let i=0; i<3; i++) {
                    const b3 = spawnBullet(); b3.pos = new Vec2(this.pos.x, this.pos.y);
                    const a = this.angle + (i * Math.PI * 2 / 3);
                    b3.vel = new Vec2(Math.cos(a) * speedBase, Math.sin(a) * speedBase); b3.color = "#00ccff"; b3.isPlayer = false;
                } break;
        }
    }
    
    draw(ctx) {
        ctx.save(); ctx.translate(this.pos.x, this.pos.y); ctx.rotate(this.angle * 0.5); 
        ctx.shadowBlur = 25; ctx.shadowColor = this.color; ctx.strokeStyle = this.color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, 0, this.radius * 1.3, 0, Math.PI * 2); ctx.setLineDash([10, 15]); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = "#0a0a1a"; ctx.lineWidth = 4; ctx.beginPath();
        const sides = 5 + (this.stage % 4);
        for(let i=0; i<=sides; i++) {
            const a = (i / sides) * Math.PI * 2;
            const x = Math.cos(a) * this.radius; const y = Math.sin(a) * this.radius;
            if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#ffffff"; ctx.shadowBlur = 30; ctx.beginPath();
        for(let i=0; i<=sides; i++) {
            const a = (i / sides) * Math.PI * 2 + (Math.PI / sides);
            const x = Math.cos(a) * (this.radius * 0.4); const y = Math.sin(a) * (this.radius * 0.4);
            if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill(); ctx.restore();
        ctx.save(); ctx.fillStyle = "#ffffff"; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.textAlign = "center"; ctx.font = "bold 20px Arial"; ctx.fillText("BOSS", this.pos.x, this.pos.y + this.radius + 30);
        ctx.restore();
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.uiLayer = document.getElementById('ui-layer');
        this.gameState = 'INIT';
        this.lastTime = 0;
        
        this.pointerActive = false;
        this.lastPointerX = 0;
        this.lastPointerY = 0;

        this.darkMatter = 0;
        this.maxSlots = 3;   
        this.maxHp = 100;    
        this.weaponLvl = 1;  

        this.currentStage = 1; this.currentSub = 1;
        this.score = 0; this.hp = this.maxHp;
        this.boss = null;
        this.transitionTimer = 0;
        this.isNextStage = false;

        this.waveQuota = 0;
        this.enemiesSpawned = 0;
        this.enemySpawnTimer = 0;
        this.idiomBlockTimer = 0; 

        // 碰撞半徑設定為15，但視覺戰機會畫得更大更華麗
        this.player = { pos: new Vec2(0, 0), radius: 15, speed: 450, lastShoot: 0, rapidFire: 0, spreadFire: 0 };
        this.keys = {};
        this.bullets = new ObjectPool(() => new Bullet(), 400);
        this.texts = new ObjectPool(() => new FloatingText(), 20);
        
        this.enemies = []; 
        this.idiomBlocks = []; 
        this.charItems = [];   
        this.slots = [];       
        
        this.laserTimer = 0; this.invincibleTimer = 0;

        this.init();
    }

    init() {
        this.resize(); window.addEventListener('resize', () => this.resize());
        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
            if (e.code.startsWith('Digit') && this.gameState === 'PLAYING') this.useIdiom(parseInt(e.code.slice(-1)) - 1);
        });
        window.addEventListener('keyup', (e) => this.keys[e.code] = false);

        this.canvas.addEventListener('touchstart', (e) => {
            if (this.gameState !== 'PLAYING') return;
            this.pointerActive = true;
            this.lastPointerX = e.touches[0].clientX;
            this.lastPointerY = e.touches[0].clientY;
        }, {passive: false});
        
        this.canvas.addEventListener('touchmove', (e) => {
            if (!this.pointerActive || this.gameState !== 'PLAYING') return;
            e.preventDefault(); 
            const dx = e.touches[0].clientX - this.lastPointerX; 
            const dy = e.touches[0].clientY - this.lastPointerY;
            this.player.pos.x += dx * 1.5; 
            this.player.pos.y += dy * 1.5;
            this.lastPointerX = e.touches[0].clientX; 
            this.lastPointerY = e.touches[0].clientY;
        }, {passive: false});
        
        this.canvas.addEventListener('touchend', () => { this.pointerActive = false; });
        this.canvas.addEventListener('touchcancel', () => { this.pointerActive = false; });

        this.canvas.addEventListener('mousedown', (e) => {
            if (this.gameState !== 'PLAYING') return;
            this.pointerActive = true; this.lastPointerX = e.clientX; this.lastPointerY = e.clientY;
        });
        this.canvas.addEventListener('mousemove', (e) => {
            if (!this.pointerActive || this.gameState !== 'PLAYING') return;
            const dx = e.clientX - this.lastPointerX; const dy = e.clientY - this.lastPointerY;
            this.player.pos.x += dx * 1.5; this.player.pos.y += dy * 1.5;
            this.lastPointerX = e.clientX; this.lastPointerY = e.clientY;
        });
        this.canvas.addEventListener('mouseup', () => { this.pointerActive = false; });
        this.canvas.addEventListener('mouseleave', () => { this.pointerActive = false; });

        this.setState('INIT'); requestAnimationFrame((t) => this.loop(t));
    }

    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }

    setState(state) {
        this.gameState = state;
        this.uiLayer.innerHTML = '';
        if (state === 'LOBBY') {
            document.getElementById('hud').style.display = 'none'; 
            document.getElementById('idiom-ui').style.display = 'none';
            document.getElementById('boss-bar').style.display = 'none';
            this.renderLobby();
        } else if (state === 'INIT') {
            this.uiLayer.innerHTML = `<div class="menu-overlay"><h1>成語戰機</h1><p style="color:#aaa; font-size:0.9rem;">支援觸控/拖曳與全自動開火</p><button class="btn btn-start" id="boot-btn">連線星際網路 (啟動音效)</button></div>`;
            document.getElementById('boot-btn').onclick = () => { sfx.init(); this.setState('LOBBY'); };
        } else if (state === 'PLAYING') {
            document.getElementById('hud').style.display = 'flex'; 
            document.getElementById('idiom-ui').style.display = 'flex';
            this.renderIdiomSlots(); this.updateHUD();
        } else if (state === 'GAMEOVER') {
            this.uiLayer.innerHTML = `<div class="menu-overlay"><h2>戰機損毀</h2><p style="color:var(--neon-purple)">本次戰鬥累積暗物質: ${this.darkMatter} DM</p><button class="btn btn-start" onclick="game.setState('LOBBY')">返回大廳</button></div>`;
        } else if (state === 'VICTORY') {
            this.uiLayer.innerHTML = `<div class="menu-overlay"><h1>完全勝利</h1><p>宇宙已恢復和平！</p><button class="btn btn-start" onclick="game.setState('LOBBY')">返回大廳</button></div>`;
        }
    }

    renderLobby() {
        const costSlot = this.maxSlots * 50; const costWeapon = this.weaponLvl * 100;
        this.uiLayer.innerHTML = `
            <div class="menu-overlay">
                <h1 style="margin-bottom:5px;">成語戰機</h1>
                <h2 class="shop-title">暗物質軍械庫</h2>
                <p style="font-size:1.3rem; color:var(--neon-purple); border:1px solid var(--neon-purple); padding:10px; border-radius:10px; background:rgba(176,38,255,0.1);">
                    持有暗物質: <b>${this.darkMatter} DM</b>
                </p>
                <hr style="border-color:#333; margin:20px 0;">
                <button class="btn btn-shop" ${this.darkMatter < costSlot || this.maxSlots >= 6 ? 'disabled' : ''} 
                    onclick="game.buyItem('SLOT', ${costSlot})">擴充成語列 (Lv.${this.maxSlots}/6) - ${this.maxSlots >= 6 ? '已滿級' : costSlot + ' DM'}</button>
                <button class="btn btn-shop" ${this.darkMatter < costWeapon || this.weaponLvl >= 10 ? 'disabled' : ''} 
                    onclick="game.buyItem('WEAPON', ${costWeapon})">升級火力 (Lv.${this.weaponLvl}/10) - ${this.weaponLvl >= 10 ? '已滿級' : costWeapon + ' DM'}</button>
                <hr style="border-color:#333; margin:20px 0;">
                <button class="btn btn-start" onclick="game.startNewGame()">開始出擊</button>
            </div>
        `;
    }

    buyItem(type, cost) {
        if (this.darkMatter >= cost) {
            this.darkMatter -= cost; sfx.playReady();
            if (type === 'SLOT' && this.maxSlots < 6) { this.maxSlots++; this.fillEmptySlots(); }
            if (type === 'WEAPON' && this.weaponLvl < 10) this.weaponLvl++;
            this.renderLobby(); 
        }
    }

    startNewGame() {
        sfx.init(); this.currentStage = 1; this.currentSub = 1; this.score = 0; 
        this.hp = this.maxHp; this.slots = []; 
        this.fillEmptySlots(); // 遊戲開始時塞滿隨機成語任務
        this.resetStage(); this.setState('PLAYING');
    }

    fillEmptySlots() {
        while (this.slots.length < this.maxSlots) {
            const rand = CONFIG.IDIOMS[Math.floor(Math.random() * CONFIG.IDIOMS.length)];
            this.slots.push({ type: 'COLLECTING', word: rand.word, chars: [], effect: rand.effect, effectDesc: rand.desc });
        }
    }

    resetStage() {
        this.boss = null;
        this.enemies = []; this.idiomBlocks = []; this.charItems = [];
        this.player.pos = new Vec2(window.innerWidth / 2, window.innerHeight - 150);
        this.bullets.pool.forEach(b => b.active = false);
        this.pointerActive = false; 
        document.getElementById('boss-bar').style.display = 'none';
        
        if (this.currentSub < 3) {
            this.waveQuota = 3 + (this.currentStage - 1) * 3 + (this.currentSub - 1) * 2;
            this.enemiesSpawned = 0;
            this.enemySpawnTimer = 0;
        } else {
            this.waveQuota = 0;
        }
        this.idiomBlockTimer = 0;
        this.showFloatText(this.currentSub === 3 ? "WARNING: BOSS" : `區塊 ${this.currentStage}-${this.currentSub} 開始`, window.innerWidth/2, window.innerHeight/2, "#ffea00");
    }

    startTransition(isNextStage) {
        this.gameState = 'TRANSITION'; this.transitionTimer = 0; this.isNextStage = isNextStage;
        this.bullets.pool.forEach(b => b.active = false); this.enemies = []; this.idiomBlocks = []; this.charItems = [];
        sfx.playTransition();
        this.showFloatText(isNextStage ? "STAGE CLEAR" : "WAVE CLEARED", window.innerWidth/2, window.innerHeight/2 - 50, "#00f2ff");
    }

    renderIdiomSlots() {
        if(this.gameState !== 'PLAYING' && this.gameState !== 'TRANSITION') return;
        const container = document.getElementById('idiom-ui'); container.innerHTML = '';
        for (let i = 0; i < this.maxSlots; i++) {
            const slot = this.slots[i]; const div = document.createElement('div');
            if (slot) {
                // 產生每個字元的 HTML 結構
                let charsHTML = slot.word.split('').map(c => 
                    `<span class="char ${slot.chars.includes(c) ? 'collected' : 'uncollected'}">${c}</span>`
                ).join('');

                if (slot.type === 'READY') {
                    div.className = 'slot ready'; 
                    div.innerHTML = `<div class="slot-title">${charsHTML}</div><div class="slot-subtitle">點擊發動<br>(${slot.effectDesc})</div>`;
                    div.onclick = (e) => { e.stopPropagation(); this.useIdiom(i); };
                    div.ontouchstart = (e) => { e.stopPropagation(); e.preventDefault(); this.useIdiom(i); };
                } else if (slot.type === 'COLLECTING') {
                    div.className = 'slot collecting';
                    div.innerHTML = `<div class="slot-title">${charsHTML}</div><div class="slot-subtitle">收集中...</div>`;
                }
            }
            container.appendChild(div);
        }
    }

    useIdiom(index) {
        const idiom = this.slots[index]; if (!idiom || idiom.type !== 'READY') return;
        
        // 發動特殊攻擊
        sfx.playUse();
        this.showFloatText(`發動！${idiom.word}！`, this.player.pos.x, this.player.pos.y - 40, '#ffea00');

        if (idiom.effect === 'BOMB_BOOST') this.triggerBomb();
        if (idiom.effect === 'INVINCIBLE') this.invincibleTimer = 10;
        if (idiom.effect === 'RAPID_FIRE') this.player.rapidFire = 6;
        if (idiom.effect === 'LASER_BEAM') this.triggerLaser();
        if (idiom.effect === 'SPREAD_FIRE') this.player.spreadFire = 8;

        // 發動完後立刻接取新的成語任務
        const rand = CONFIG.IDIOMS[Math.floor(Math.random() * CONFIG.IDIOMS.length)];
        this.slots[index] = { type: 'COLLECTING', word: rand.word, chars: [], effect: rand.effect, effectDesc: rand.desc };
        this.renderIdiomSlots(); 
    }

    triggerBomb() {
        this.bullets.pool.forEach(b => { if(!b.isPlayer) b.active = false; });
        if (this.boss) this.boss.hp -= 300;
        this.enemies.forEach(e => { this.dropDarkMatter(e.pos.x, e.pos.y, e.maxHp * 2); sfx.playExplosion(); });
        this.enemies = []; this.showFloatText("全螢幕爆破!", window.innerWidth/2, window.innerHeight/2, "#ff00ff");
    }
    triggerLaser() { this.laserTimer = 1.0; if(this.boss) this.boss.hp -= 200; }

    showFloatText(text, x, y, color = "#fff") { const t = this.texts.get(); t.pos = new Vec2(x, y); t.text = text; t.color = color; t.life = 1.5; }
    dropDarkMatter(x, y, amount) { this.darkMatter += amount; this.showFloatText(`+${amount} DM`, x, y, "#b026ff"); this.updateHUD(); }

    updateHUD() {
        if(this.gameState !== 'PLAYING' && this.gameState !== 'TRANSITION') return;
        document.getElementById('hp-val').innerText = Math.max(0, Math.floor(this.hp));
        document.getElementById('dm-val').innerText = this.darkMatter;
        document.getElementById('lvl-val').innerText = this.currentStage === 9 ? "FINAL BOSS" : `${this.currentStage}-${this.currentSub}`;
    }

    loop(timestamp) {
        const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1); this.lastTime = timestamp;
        if (this.gameState === 'PLAYING') this.update(dt); else if (this.gameState === 'TRANSITION') this.updateTransition(dt);
        this.draw(); requestAnimationFrame((t) => this.loop(t));
    }

    updateTransition(dt) {
        this.transitionTimer += dt;
        if (this.transitionTimer > 1.0 && this.transitionTimer <= 2.0) this.player.pos.y -= 1000 * dt; 
        if (this.transitionTimer > 2.0) {
            if (this.isNextStage) {
                if (this.currentStage < CONFIG.MAX_STAGES) { this.currentStage++; this.currentSub = 1; } 
                else if (this.currentStage === 8) { this.currentStage = 9; this.currentSub = 1; } 
                else { this.setState('VICTORY'); return; }
            } else { this.currentSub++; }
            this.resetStage(); this.setState('PLAYING'); this.updateHUD();
        }
        this.texts.pool.forEach(t => { if(t.active) t.update(dt); });
    }

    spawnEnemy() {
        const diff = this.currentStage + this.currentSub;
        const angle = Math.random() * Math.PI * 2; 
        let eType = 'SCOUT'; 
        let r = Math.random();
        
        if (this.currentStage > 2) { if (r > 0.8) eType = 'TANK'; else if (r > 0.4) eType = 'FIGHTER'; } 
        else if (this.currentStage > 1) { if (r > 0.6) eType = 'FIGHTER'; } 
        else { if (r > 0.8) eType = 'FIGHTER'; }

        let speed, maxHp, radius, color, shootInterval;
        if (eType === 'SCOUT') { speed = 120 + this.currentStage * 15; maxHp = 2 + this.currentStage * 1; radius = 14; color = "var(--neon-green)"; shootInterval = 4.0; } 
        else if (eType === 'FIGHTER') { speed = 80 + this.currentStage * 10; maxHp = 6 + this.currentStage * 2.5; radius = 20; color = "var(--neon-orange)"; shootInterval = 2.0; } 
        else if (eType === 'TANK') { speed = 40 + this.currentStage * 5; maxHp = 15 + this.currentStage * 5; radius = 30; color = "var(--neon-red)"; shootInterval = 1.2; }

        this.enemies.push({ 
            type: eType, pos: new Vec2(Math.random() * (window.innerWidth - 60) + 30, -30), 
            vel: new Vec2(Math.cos(angle)*speed, Math.sin(angle)*speed), 
            hp: maxHp, maxHp: maxHp, radius: radius, color: color, diff: diff,
            shootTimer: Math.random() * shootInterval, shootInterval: shootInterval 
        });
    }

    update(dt) {
        if (this.keys['KeyW'] || this.keys['ArrowUp']) this.player.pos.y -= this.player.speed * dt;
        if (this.keys['KeyS'] || this.keys['ArrowDown']) this.player.pos.y += this.player.speed * dt;
        if (this.keys['KeyA'] || this.keys['ArrowLeft']) this.player.pos.x -= this.player.speed * dt;
        if (this.keys['KeyD'] || this.keys['ArrowRight']) this.player.pos.x += this.player.speed * dt;
        
        this.player.pos.x = Math.max(20, Math.min(window.innerWidth - 20, this.player.pos.x));
        this.player.pos.y = Math.max(20, Math.min(window.innerHeight - 20, this.player.pos.y));

        const fireRate = this.player.rapidFire > 0 ? 50 : Math.max(80, 200 - this.weaponLvl * 10);
        if (Date.now() - this.player.lastShoot > fireRate) {
            const dmg = 1 + (this.weaponLvl * 0.5);
            const shootBullet = (offset, angle) => {
                const b = this.bullets.get(); b.pos = new Vec2(this.player.pos.x + offset, this.player.pos.y - 25);
                b.vel = new Vec2(Math.sin(angle)*800, -Math.cos(angle)*800);
                b.color = "#00f2ff"; b.isPlayer = true; b.radius = 4 + (this.weaponLvl * 0.5); b.damage = dmg;
            };
            shootBullet(0, 0); 
            if (this.weaponLvl >= 3 || this.player.spreadFire > 0) { shootBullet(-15, -0.15); shootBullet(15, 0.15); }
            if (this.weaponLvl >= 6 || this.player.spreadFire > 0) { shootBullet(-25, -0.3); shootBullet(25, 0.3); }
            if (this.player.spreadFire > 0) { shootBullet(-35, -0.45); shootBullet(35, 0.45); }
            this.player.lastShoot = Date.now(); sfx.playShoot();
        }

        if (!this.boss) {
            if (this.currentSub < 3) {
                if (this.enemiesSpawned < this.waveQuota) {
                    this.enemySpawnTimer -= dt;
                    const maxOnScreen = Math.min(8, 2 + Math.floor(this.currentStage * 0.6));
                    if (this.enemySpawnTimer <= 0 && this.enemies.length < maxOnScreen) {
                        this.spawnEnemy(); this.enemiesSpawned++; this.enemySpawnTimer = Math.max(0.5, 2.0 - this.currentStage * 0.15); 
                    }
                } else if (this.enemies.length === 0) { this.startTransition(false); }
            } else {
                this.boss = new Boss(this.currentStage); document.getElementById('boss-bar').style.display = 'block'; sfx.playReady();
            }
        }

        // 掉落成語字塊：分析當前需要哪些字，提高掉落機率
        this.idiomBlockTimer += dt;
        if (this.idiomBlockTimer > 2.0) { // 稍微加快掉落速度
            if (Math.random() < 0.7) this.spawnIdiomBlock(Math.random() * (window.innerWidth-60) + 30, -50);
            this.idiomBlockTimer = 0;
        }

        if (this.boss) {
            this.boss.update(dt, this.player.pos, () => this.bullets.get(), (x,y) => this.spawnIdiomBlock(x,y));
            document.getElementById('boss-hp-fill').style.width = (this.boss.hp / this.boss.maxHp * 100) + "%";
            if (this.boss.hp <= 0) {
                this.dropDarkMatter(this.boss.pos.x, this.boss.pos.y, this.boss.dmReward);
                sfx.playExplosion(); this.boss = null; this.startTransition(true);
            }
        }

        this.enemies.forEach((e, i) => {
            e.pos.x += e.vel.x * dt; e.pos.y += e.vel.y * dt;
            if (e.pos.x < e.radius) { e.pos.x = e.radius; e.vel.x = Math.abs(e.vel.x); }
            if (e.pos.x > window.innerWidth - e.radius) { e.pos.x = window.innerWidth - e.radius; e.vel.x = -Math.abs(e.vel.x); }
            if (e.pos.y < e.radius) { e.pos.y = e.radius; e.vel.y = Math.abs(e.vel.y); }
            if (e.pos.y > window.innerHeight - e.radius) { e.pos.y = window.innerHeight - e.radius; e.vel.y = -Math.abs(e.vel.y); }

            e.shootTimer += dt;
            if (e.shootTimer > e.shootInterval) {
                e.shootTimer = 0; const b = this.bullets.get(); b.pos = new Vec2(e.pos.x, e.pos.y + e.radius);
                const angleToPlayer = Math.atan2(this.player.pos.y - e.pos.y, this.player.pos.x - e.pos.x);
                const bulletSpeed = 100 + this.currentStage * 10;
                
                if (e.type === 'TANK') {
                    const b2 = this.bullets.get(); b2.pos = new Vec2(e.pos.x - 10, e.pos.y + e.radius); b.pos.x += 10;
                    b.vel = new Vec2(Math.cos(angleToPlayer) * bulletSpeed, Math.sin(angleToPlayer) * bulletSpeed); 
                    b2.vel = new Vec2(Math.cos(angleToPlayer) * bulletSpeed, Math.sin(angleToPlayer) * bulletSpeed); 
                    b.color = b2.color = e.color; b.isPlayer = b2.isPlayer = false; b.radius = b2.radius = 6; b.damage = b2.damage = 2;
                } else {
                    b.vel = new Vec2(Math.cos(angleToPlayer) * bulletSpeed, Math.sin(angleToPlayer) * bulletSpeed); 
                    b.color = e.color; b.isPlayer = false; b.radius = 4; b.damage = 1;
                }
                sfx.playEnemyShoot();
            }

            if (Math.hypot(e.pos.x - this.player.pos.x, e.pos.y - this.player.pos.y) < e.radius + this.player.radius && this.invincibleTimer <= 0) {
                this.hp -= (e.type === 'TANK' ? 25 : 15); this.invincibleTimer = 1.0; sfx.playHit(); this.updateHUD(); if(this.hp<=0) this.setState('GAMEOVER');
            }
        });

        this.bullets.pool.forEach(b => {
            if (b.active) {
                b.update(dt);
                if (b.pos.y < -50 || b.pos.y > window.innerHeight + 50 || b.pos.x < -50 || b.pos.x > window.innerWidth+50) b.active = false;
                
                if (b.isPlayer) {
                    if (this.boss && Math.hypot(b.pos.x - this.boss.pos.x, b.pos.y - this.boss.pos.y) < this.boss.radius) {
                        this.boss.hp -= b.damage; b.active = false; sfx.playHit();
                    }
                    this.enemies.forEach((e, i) => {
                        if (Math.hypot(b.pos.x - e.pos.x, b.pos.y - e.pos.y) < e.radius) {
                            e.hp -= b.damage; b.active = false; sfx.playHit();
                            if(e.hp<=0) { this.dropDarkMatter(e.pos.x, e.pos.y, e.maxHp * 1.5); sfx.playExplosion(); this.enemies.splice(i, 1); }
                        }
                    });
                    this.idiomBlocks.forEach((m, i) => {
                        if (Math.hypot(b.pos.x - m.pos.x, b.pos.y - m.pos.y) < m.radius) {
                            m.hp -= b.damage; b.active = false; sfx.playHit();
                            if(m.hp<=0) {
                                this.charItems.push({ pos: new Vec2(m.pos.x, m.pos.y), char: m.char });
                                sfx.playExplosion(); this.idiomBlocks.splice(i, 1);
                            }
                        }
                    });
                } else {
                    if (Math.hypot(b.pos.x - this.player.pos.x, b.pos.y - this.player.pos.y) < this.player.radius && this.invincibleTimer <= 0) {
                        this.hp -= b.damage * 10; b.active = false; this.invincibleTimer = 0.5; sfx.playHit(); this.updateHUD(); if(this.hp<=0) this.setState('GAMEOVER');
                    }
                }
            }
        });

        this.idiomBlocks.forEach((m, i) => {
            m.pos.y += 60 * dt; 
            if (m.pos.y > window.innerHeight + m.radius) this.idiomBlocks.splice(i, 1);
            else if (Math.hypot(m.pos.x - this.player.pos.x, m.pos.y - this.player.pos.y) < m.radius + this.player.radius && this.invincibleTimer <= 0) {
                this.hp -= 20; this.invincibleTimer = 1.0; this.idiomBlocks.splice(i, 1); sfx.playHit(); this.updateHUD(); if(this.hp<=0) this.setState('GAMEOVER');
            }
        });

        this.charItems.forEach((c, i) => {
            c.pos.y += 120 * dt; 
            if (Math.hypot(c.pos.x - this.player.pos.x, c.pos.y - this.player.pos.y) < 40) {
                this.collectChar(c.char); this.charItems.splice(i, 1);
            }
        });

        if (this.laserTimer > 0) {
            this.enemies.forEach((e, i) => {
                if (Math.abs(e.pos.x - this.player.pos.x) < 25 && e.pos.y < this.player.pos.y) {
                    e.hp -= 50 * dt; if(e.hp<=0) { this.dropDarkMatter(e.pos.x, e.pos.y, e.maxHp*1.5); sfx.playExplosion(); this.enemies.splice(i, 1); }
                }
            });
            this.idiomBlocks.forEach((m, i) => {
                if (Math.abs(m.pos.x - this.player.pos.x) < 25 && m.pos.y < this.player.pos.y) {
                    m.hp -= 100 * dt; 
                    if(m.hp<=0) { this.charItems.push({ pos: new Vec2(m.pos.x, m.pos.y), char: m.char }); sfx.playExplosion(); this.idiomBlocks.splice(i, 1); }
                }
            });
        }

        this.texts.pool.forEach(t => { if(t.active) t.update(dt); });

        if (this.invincibleTimer > 0) this.invincibleTimer -= dt;
        if (this.player.rapidFire > 0) this.player.rapidFire -= dt;
        if (this.player.spreadFire > 0) this.player.spreadFire -= dt;
        if (this.laserTimer > 0) this.laserTimer -= dt;
    }

    // 智能掉落：高機率掉落目前需要的字元
    spawnIdiomBlock(x, y) {
        let neededChars = [];
        this.slots.forEach(slot => {
            if (slot.type === 'COLLECTING') {
                for (let char of slot.word) {
                    if (!slot.chars.includes(char)) neededChars.push(char);
                }
            }
        });

        let dropChar;
        if (neededChars.length > 0 && Math.random() < 0.8) {
            dropChar = neededChars[Math.floor(Math.random() * neededChars.length)];
        } else {
            const randomIdiom = CONFIG.IDIOMS[Math.floor(Math.random() * CONFIG.IDIOMS.length)];
            dropChar = randomIdiom.word[Math.floor(Math.random() * 4)];
        }

        this.idiomBlocks.push({ pos: new Vec2(x, y), radius: 25, hp: 6 + this.currentStage*2, char: dropChar, maxHp: 6 + this.currentStage*2 });
    }

    // 無序收集判定
    collectChar(char) {
        let collected = false;
        for (let slot of this.slots) {
            if (slot.type === 'COLLECTING' && slot.word.includes(char) && !slot.chars.includes(char)) {
                slot.chars.push(char);
                collected = true;
                sfx.playCollect();
                this.showFloatText(char, this.player.pos.x, this.player.pos.y - 20, '#00f2ff');

                if (slot.chars.length === 4) {
                    slot.type = 'READY';
                    sfx.playReady();
                    this.showFloatText(`${slot.word} 完成!`, this.player.pos.x, this.player.pos.y - 40, '#ffea00');
                }
                break; // 只要有一個槽位吸收了這個字就跳出
            }
        }

        if (!collected) {
            // 如果吸收的字目前不需要，轉換為暗物質
            this.dropDarkMatter(this.player.pos.x, this.player.pos.y, 10);
            this.showFloatText("轉換DM", this.player.pos.x, this.player.pos.y - 20, '#b026ff');
            sfx.playHit();
        }
        this.renderIdiomSlots();
    }

    draw() {
        const ctx = this.ctx;
        ctx.fillStyle = "#050510"; ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        const starSpeed = this.gameState === 'TRANSITION' && this.transitionTimer > 1.0 ? 200 : 20;
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        for(let i=0; i<40; i++) {
            const x = (Math.sin(i*99) + 1) / 2 * this.canvas.width;
            const y = (Date.now() / (1000/starSpeed) + i * 200) % this.canvas.height;
            ctx.fillRect(x, y, 2, 2);
        }

        if (this.gameState === 'PLAYING' || this.gameState === 'TRANSITION') {
            if (this.laserTimer > 0) {
                const laserWidth = 40 + Math.random() * 10;
                ctx.fillStyle = "rgba(255, 234, 0, 0.8)"; ctx.shadowBlur = 25; ctx.shadowColor = "#ffea00";
                ctx.fillRect(this.player.pos.x - laserWidth/2, 0, laserWidth, this.player.pos.y); ctx.shadowBlur = 0;
                ctx.fillStyle = "#ffffff"; ctx.fillRect(this.player.pos.x - laserWidth/4, 0, laserWidth/2, this.player.pos.y);
            }

            // 【全新：華麗星際戰機繪製】
            ctx.save();
            ctx.translate(this.player.pos.x, this.player.pos.y);
            
            const isInv = this.invincibleTimer > 0;
            const mainColor = isInv ? "var(--neon-gold)" : "var(--neon-blue)";
            const hullColor = "#0f172a"; // 金屬暗灰
            
            ctx.shadowBlur = isInv ? 20 : 10;
            ctx.shadowColor = mainColor;

            // 引擎噴射火焰
            if (isInv || Math.floor(Date.now() / 50) % 2 === 0) {
                const flameLen = (this.gameState === 'TRANSITION' && this.transitionTimer > 1.0) ? 60 : 25 + Math.random() * 15;
                ctx.fillStyle = isInv ? "#ffffff" : "#ffaa00";
                ctx.shadowBlur = 20; ctx.shadowColor = "#ffaa00";
                
                // 左引擎
                ctx.beginPath(); ctx.moveTo(-12, 12); ctx.lineTo(-6, 12); ctx.lineTo(-9, 12 + flameLen); ctx.fill();
                // 右引擎
                ctx.beginPath(); ctx.moveTo(6, 12); ctx.lineTo(12, 12); ctx.lineTo(9, 12 + flameLen); ctx.fill();
            }

            ctx.shadowBlur = isInv ? 15 : 5;
            
            // 主機翼 (外展後掠翼)
            ctx.fillStyle = hullColor;
            ctx.strokeStyle = mainColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -10);
            ctx.lineTo(-30, 15); // 左翼尖
            ctx.lineTo(-30, 20);
            ctx.lineTo(-10, 10);
            ctx.lineTo(10, 10);
            ctx.lineTo(30, 20); // 右翼尖
            ctx.lineTo(30, 15);
            ctx.closePath();
            ctx.fill(); ctx.stroke();

            // 內側輔助翼
            ctx.beginPath();
            ctx.moveTo(0, -15);
            ctx.lineTo(-15, 5);
            ctx.lineTo(15, 5);
            ctx.closePath();
            ctx.fillStyle = "#1e293b";
            ctx.fill(); ctx.stroke();

            // 戰機機身 (流線型)
            ctx.beginPath();
            ctx.moveTo(0, -32); // 機鼻
            ctx.lineTo(-8, -5);
            ctx.lineTo(-8, 15); // 機尾
            ctx.lineTo(0, 18);
            ctx.lineTo(8, 15);
            ctx.lineTo(8, -5);
            ctx.closePath();
            ctx.fillStyle = hullColor;
            ctx.fill(); ctx.stroke();

            // 發光駕駛艙
            ctx.fillStyle = isInv ? "rgba(255, 234, 0, 0.9)" : "rgba(0, 242, 255, 0.9)";
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(-4, -5);
            ctx.lineTo(0, 2);
            ctx.lineTo(4, -5);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();

            if (this.boss) this.boss.draw(ctx);
            this.bullets.pool.forEach(b => { if(b.active) b.draw(ctx); });
            
            const time = Date.now();
            this.enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.pos.x, e.pos.y);
                const pulse = (Math.sin(time / 80) + 1) / 2;
                ctx.shadowBlur = 10 + pulse * 15; 
                ctx.shadowColor = e.color;
                ctx.strokeStyle = e.color; 
                ctx.fillStyle = "#111"; 
                
                ctx.beginPath();
                if (e.type === 'SCOUT') {
                    ctx.lineWidth = 2;
                    ctx.moveTo(0, e.radius); ctx.lineTo(e.radius, -e.radius); ctx.lineTo(0, -e.radius*0.5); ctx.lineTo(-e.radius, -e.radius);
                } else if (e.type === 'FIGHTER') {
                    ctx.lineWidth = 2;
                    ctx.moveTo(0, e.radius); ctx.lineTo(e.radius*0.8, e.radius*0.2); ctx.lineTo(e.radius*1.2, -e.radius*0.4); 
                    ctx.lineTo(e.radius*0.3, -e.radius*0.2); ctx.lineTo(e.radius*0.2, -e.radius*0.8); ctx.lineTo(-e.radius*0.2, -e.radius*0.8); 
                    ctx.lineTo(-e.radius*0.3, -e.radius*0.2); ctx.lineTo(-e.radius*1.2, -e.radius*0.4); ctx.lineTo(-e.radius*0.8, e.radius*0.2);
                } else if (e.type === 'TANK') {
                    ctx.lineWidth = 3 + pulse;
                    for(let i=0; i<=6; i++) {
                        const a = (i / 6) * Math.PI * 2 + (Math.PI/6);
                        const r = e.radius * (i%2===0 ? 1 : 0.8);
                        if(i===0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r); else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                    }
                    ctx.fillStyle = e.color; ctx.fillRect(-e.radius, -e.radius - 10, (e.hp/e.maxHp)*e.radius*2, 4); ctx.fillStyle = "#111";
                }
                ctx.closePath(); ctx.fill(); ctx.stroke();
                
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 20 * pulse;
                ctx.beginPath(); ctx.arc(0, e.type==='TANK'?0:e.radius*0.3, e.radius*0.25, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            });

            this.idiomBlocks.forEach(m => {
                ctx.save(); ctx.translate(m.pos.x, m.pos.y);
                const blockPulse = (Math.sin(time / 150) + 1) / 2;
                ctx.fillStyle = `rgba(0, 242, 255, ${0.1 + blockPulse * 0.2})`; ctx.strokeStyle = "var(--neon-blue)";
                ctx.lineWidth = 2; ctx.shadowBlur = 15; ctx.shadowColor = "var(--neon-blue)";
                ctx.beginPath(); ctx.rect(-m.radius, -m.radius, m.radius*2, m.radius*2); ctx.fill(); ctx.stroke();
                
                ctx.fillStyle = "#ffffff"; ctx.shadowBlur = 5; ctx.font = `bold ${m.radius}px 'Microsoft JhengHei'`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(m.char, 0, 0);

                ctx.fillStyle = "rgba(0, 242, 255, 0.8)"; ctx.fillRect(-m.radius, m.radius + 5, (m.hp/m.maxHp)*m.radius*2, 3);
                ctx.restore();
            });

            this.charItems.forEach(c => { 
                ctx.save();
                ctx.fillStyle = "var(--neon-gold)"; ctx.shadowBlur = 15; ctx.shadowColor = "var(--neon-gold)";
                ctx.font = "bold 28px 'Microsoft JhengHei'"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(c.char, c.pos.x, c.pos.y); 
                
                ctx.strokeStyle = "rgba(255, 234, 0, 0.5)"; ctx.lineWidth = 2; ctx.beginPath();
                ctx.arc(c.pos.x, c.pos.y, 20 + Math.sin(time/100)*5, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            });

            this.texts.pool.forEach(t => { if(t.active) t.draw(ctx); });
        }
    }
}

const game = new Game();
</script>
</body>
</html>
